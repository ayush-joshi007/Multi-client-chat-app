<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

<body>

    <div id="layout">
        <div id="left"></div>
        <div id="chat">
            <div id="messages"> </div>

            <div id="inputDiv">

            </div>

        </div>
        <div id="right"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
